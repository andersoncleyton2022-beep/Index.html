<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Diamante Bot - Master</title>
    <style>
        :root {
            --primary-bg: #0b141a;
            --secondary-bg: #111b21;
            --accent-color: #00a884;
            --text-main: #e9edef;
            --text-secondary: #8696a0;
            --message-in: #202c33;
            --message-out: #005c4b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }

        body {
            background-color: var(--primary-bg);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header */
        header {
            background-color: var(--secondary-bg);
            padding: 10px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 10;
        }

        .user-info { display: flex; align-items: center; gap: 12px; }

        .bot-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: #333;
            cursor: pointer;
            object-fit: cover;
            border: 2px solid var(--accent-color);
        }

        /* Área de Chat */
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
            background-blend-mode: overlay;
        }

        .message {
            max-width: 85%;
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 15px;
            line-height: 1.4;
        }

        .message.bot { align-self: flex-start; background-color: var(--message-in); }
        .message.user { align-self: flex-end; background-color: var(--message-out); }

        /* Barra de Digitação Fixa (WhatsApp) */
        .footer-bar {
            background-color: var(--secondary-bg);
            padding: 8px 10px;
            display: flex;
            align-items: flex-end;
            gap: 8px;
        }

        .input-container {
            flex: 1;
            background-color: #2a3942;
            border-radius: 25px;
            display: flex;
            align-items: flex-end;
            padding: 5px 12px;
        }

        #message-input {
            flex: 1;
            background: none;
            border: none;
            color: white;
            padding: 10px;
            outline: none;
            resize: none;
            max-height: 150px;
            font-size: 16px;
        }

        .icon-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 22px;
            padding: 8px;
            cursor: pointer;
        }

        .send-btn {
            background-color: var(--accent-color);
            color: white;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        /* Modais */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: var(--secondary-bg);
            width: 90%;
            max-width: 400px;
            padding: 20px;
            border-radius: 15px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #2a3942;
            border: 1px solid #333;
            color: white;
            border-radius: 8px;
        }

        .btn-main {
            width: 100%;
            padding: 12px;
            background: var(--accent-color);
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<header>
    <div class="user-info">
        <img id="bot-img" src="https://via.placeholder.com/45" class="bot-avatar" onclick="document.getElementById('file-avatar').click()" title="Toque para mudar a foto">
        <div>
            <div style="font-weight: bold;">Diamante Bot</div>
            <div style="font-size: 12px; color: var(--accent-color);">online</div>
        </div>
    </div>
    <div style="display: flex; gap: 5px;">
        <button class="icon-btn" onclick="toggleSearch()">🔍</button>
        <button class="icon-btn" onclick="openAdmin()">⚙️</button>
    </div>
</header>

<div id="chat-container">
    <div class="message bot">Olá! Como posso ajudar você hoje?</div>
</div>

<div class="footer-bar">
    <div class="input-container">
        <button class="icon-btn" onclick="document.getElementById('file-input').click()">📎</button>
        <textarea id="message-input" placeholder="Mensagem" rows="1"></textarea>
        <button class="icon-btn">📷</button>
    </div>
    <button class="send-btn" onclick="sendMessage()">
        <span id="btn-icon">🎤</span>
    </button>
</div>

<input type="file" id="file-input" style="display:none" onchange="handleFile(event)">
<input type="file" id="file-avatar" style="display:none" accept="image/*" onchange="updateAvatar(event)">

<div id="admin-modal" class="modal">
    <div class="modal-content">
        <h3>Configurações ADM</h3>
        <br>
        <label>Chave API Principal</label>
        <input type="password" value="sk-xxxxxxxx" id="key1">
        <label>Adicionar E-mail de outro ADM</label>
        <input type="email" id="adm-email" placeholder="email@gmail.com">
        <button class="btn-main" onclick="saveAdm()">SALVAR</button>
        <button onclick="closeAdmin()" style="background:none; border:none; color:gray; width:100%; margin-top:10px;">Fechar</button>
    </div>
</div>

<script>
    const input = document.getElementById('message-input');
    const btnIcon = document.getElementById('btn-icon');

    // Ajuste automático do texto
    input.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = (this.scrollHeight) + 'px';
        btnIcon.innerText = this.value.trim() ? '➤' : '🎤';
    });

    function sendMessage() {
        const text = input.value.trim();
        if(text) {
            addMsg(text, 'user');
            input.value = '';
            input.style.height = 'auto';
            btnIcon.innerText = '🎤';
            setTimeout(() => addMsg("Diamante Bot recebeu sua mensagem!", 'bot'), 1000);
        } else if(btnIcon.innerText === '🎤') {
            alert("Gravando áudio...");
        }
    }

    function addMsg(text, type) {
        const div = document.createElement('div');
        div.className = `message ${type}`;
        div.innerText = text;
        
        // Segurar para copiar
        div.oncontextmenu = (e) => {
            e.preventDefault();
            if(confirm("Copiar mensagem?")) navigator.clipboard.writeText(text);
        };

        document.getElementById('chat-container').appendChild(div);
        document.getElementById('chat-container').scrollTop = document.getElementById('chat-container').scrollHeight;
    }

    function updateAvatar(e) {
        const reader = new FileReader();
        reader.onload = () => document.getElementById('bot-img').src = reader.result;
        reader.readAsDataURL(e.target.files[0]);
    }

    function handleFile(e) {
        addMsg("📎 Arquivo: " + e.target.files[0].name, 'user');
    }

    function openAdmin() { document.getElementById('admin-modal').style.display = 'flex'; }
    function closeAdmin() { document.getElementById('admin-modal').style.display = 'none'; }
    function saveAdm() { alert("Configurações salvas!"); closeAdmin(); }
    function toggleSearch() { 
        const q = prompt("O que deseja buscar no Google?");
        if(q) window.open("https://www.google.com/search?q=" + q);
    }
</script>
</body>
</html>
