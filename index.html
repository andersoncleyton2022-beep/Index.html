<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DIAMANTE BOT | MASTER SYSTEM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root {
            --wa-bg: #0b141a; 
            --wa-header: #202c33; 
            --wa-green: #00a884;
            --wa-msg-me: #005c4b; 
            --wa-msg-ai: #202c33; 
            --wa-text: #e9edef;
            --wa-input: #2a3942; 
            --wa-accent: #00e676;
            --main-bg-img: none;
            --chat-bg-img: none;
        }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { background: var(--wa-bg); color: var(--wa-text); height: 100vh; overflow: hidden; }
        
        #auth-screen { position: fixed; inset: 0; background: #050a0d; z-index: 10000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: rgba(34, 46, 53, 0.95); backdrop-filter: blur(5px); padding: 30px; border-radius: 15px; width: 100%; max-width: 380px; text-align: center; border-top: 5px solid var(--wa-green); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .auth-logo-container { width: 90px; height: 90px; border-radius: 50%; overflow: hidden; margin: 0 auto 15px auto; border: 3px solid var(--wa-green); background: #3b4a54; }
        .auth-logo-img { width: 100%; height: 100%; object-fit: cover; }
        .auth-input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; background: var(--wa-input); color: white; outline: none; font-size: 16px; }
        .btn-green { background: var(--wa-green); color: white; border: none; padding: 12px; border-radius: 30px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        
        #app-main { display: none; height: 100vh; flex-direction: column; background-color: rgba(11,20,26,0.9); background-image: var(--main-bg-img); background-size: cover; }
        header { background: var(--wa-header); padding: 10px 15px; display: flex; align-items: center; gap: 12px; height: 60px; z-index: 10; }
        .avatar-container { width: 40px; height: 40px; border-radius: 50%; overflow: hidden; background: #3b4a54; border: 2px solid var(--wa-green); }
        .avatar-img { width: 100%; height: 100%; object-fit: cover; }
        #chat-window { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background-image: var(--chat-bg-img); background-size: cover; }
        
        .status-dot-container { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #8696a0; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #b71c1c; }
        .status-dot.online { background: var(--wa-accent); box-shadow: 0 0 6px var(--wa-accent); }
        
        .bubble-wrapper { display: flex; width: 100%; gap: 8px; }
        .bubble-wrapper.me { justify-content: flex-end; }
        .bubble { max-width: 75%; padding: 10px; border-radius: 10px; font-size: 15px; position: relative; }
        .bubble.me { background: var(--wa-msg-me); border-top-right-radius: 0; }
        .bubble.ai { background: var(--wa-msg-ai); border-top-left-radius: 0; }
        .chat-avatar { width: 32px; height: 32px; border-radius: 50%; overflow: hidden; border: 1px solid var(--wa-green); }
        
        pre { background: #000; color: #00ff00; padding: 10px; border-radius: 8px; overflow-x: auto; font-size: 12px; margin-top: 5px; }
        .drawer { position: fixed; top: 0; right: -100%; width: 85%; max-width: 400px; height: 100%; background: #111b21; z-index: 20000; transition: 0.4s; padding: 25px; border-left: 2px solid var(--wa-green); overflow-y: auto; }
        .drawer.active { right: 0; }
        .section-card { background: #1e2a30; padding: 15px; border-radius: 10px; margin-bottom: 15px; border-left: 3px solid var(--wa-green); }

        footer { background: var(--wa-header); padding: 10px; display: flex; align-items: center; gap: 10px; }
        .input-bar { flex: 1; background: var(--wa-input); border-radius: 25px; padding: 5px 15px; display: flex; align-items: center; }
        #msg-input { flex: 1; background: transparent; border: none; color: white; padding: 10px; outline: none; }
        .action-icon { color: #8696a0; font-size: 20px; cursor: pointer; }
        .badge-file { background: #004d40; color: #00e676; padding: 3px 8px; border-radius: 5px; font-size: 12px; margin-top: 5px; display: none; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-card">
            <div class="auth-logo-container">
                <img src="https://i.imgur.com/89S9fT3.png" class="auth-logo-img global-bot-img">
            </div>
            <h2 style="color:var(--wa-green);">DIAMANTE LOGIN</h2>
            <input type="email" id="auth-email" class="auth-input" placeholder="E-mail">
            <input type="password" id="auth-pass" class="auth-input" placeholder="Senha">
            <button class="btn-green" id="login-btn">ENTRAR NO SISTEMA</button>
            <div style="margin: 15px 0; color: #8696a0; font-size: 12px;">OU</div>
            <div id="g_id_onload" data-client_id="296654630911-tvpnofs4m5rkp4n7sj67g8bd12iu3qrg.apps.googleusercontent.com" data-callback="handleCredentialResponse"></div>
            <div class="g_id_signin" data-type="standard"></div>
        </div>
    </div>

    <div id="app-main">
        <header>
            <div class="avatar-container"><img src="https://i.imgur.com/89S9fT3.png" class="avatar-img global-bot-img"></div>
            <div style="flex: 1;">
                <h4 style="font-size: 16px;">DIAMANTE BOT</h4>
                <div class="status-dot-container"><div id="api-status-dot" class="status-dot"></div><span id="api-status-text">API Offline</span></div>
            </div>
            <i class="fa-solid fa-sliders action-icon" id="open-user-menu"></i>
            <i class="fa-solid fa-user-shield action-icon" id="open-admin-menu" style="display: none; color: #ff3d00;"></i>
            <i class="fa-solid fa-right-from-bracket action-icon" id="logout-btn"></i>
        </header>

        <main id="chat-window"></main>

        <footer>
            <div class="input-bar">
                <label for="file-upload" class="action-icon"><i class="fa-solid fa-paperclip"></i></label>
                <input type="file" id="file-upload" style="display: none;" accept=".zip,.txt,.js,.html,.css">
                <div style="flex: 1; display: flex; flex-direction: column;">
                    <input type="text" id="msg-input" placeholder="Mensagem ou anexe ZIP...">
                    <span id="file-badge" class="badge-file"></span>
                </div>
            </div>
            <button id="send-btn" style="background: var(--wa-green); border: none; width: 45px; height: 45px; border-radius: 50%; color: white; cursor: pointer;">
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </footer>
    </div>

    <div id="admin-drawer" class="drawer">
        <h3 style="color: #ff3d00;">Painel Master Admin</h3>
        <div class="section-card">
            <b>Chaves API (Até 3):</b>
            <input type="password" id="admin-key-1" class="auth-input" placeholder="Chave 1 (Principal)">
            <input type="password" id="admin-key-2" class="auth-input" placeholder="Chave 2">
            <input type="password" id="admin-key-3" class="auth-input" placeholder="Chave 3">
            <button class="btn-green" id="save-admin-visuals">SALVAR CONFIGURAÇÕES</button>
        </div>
        <button class="btn-green" style="background:#3b4a54" id="close-admin-btn">FECHAR</button>
    </div>

    <script>
        const MASTER_ADMIN_EMAIL = "andersoncleyton2022@gmail.com";
        const MASTER_ADMIN_PASS = "339317";
        let rawAttachedFileContent = "";

        function handleCredentialResponse(response) { efetuarLoginSessao("Google User", false); }

        document.getElementById("login-btn").addEventListener("click", () => {
            const email = document.getElementById("auth-email").value.trim().toLowerCase();
            const pass = document.getElementById("auth-pass").value;
            if (email === MASTER_ADMIN_EMAIL && pass === MASTER_ADMIN_PASS) {
                efetuarLoginSessao(email, true);
            } else {
                alert("Acesso Negado.");
            }
        });

        function efetuarLoginSessao(email, isAdmin) {
            document.getElementById("auth-screen").style.display = "none";
            document.getElementById("app-main").style.display = "flex";
            if (isAdmin) document.getElementById("open-admin-menu").style.display = "block";
            carregarConfiguracoes();
            carregarHistoricoChat(email);
        }

        // Sistema ZIP e Arquivos
        document.getElementById("file-upload").addEventListener("change", function(e) {
            const file = e.target.files[0];
            if (!file) return;
            document.getElementById("file-badge").innerText = `📎 ${file.name}`;
            document.getElementById("file-badge").style.display = "block";
            
            const reader = new FileReader();
            if (file.name.endsWith('.zip')) {
                reader.onload = (evt) => {
                    JSZip.loadAsync(evt.target.result).then(zip => {
                        let content = "--- CONTEÚDO ZIP ---\n";
                        let promises = [];
                        zip.forEach((path, entry) => {
                            if (!entry.dir) {
                                promises.push(entry.async("text").then(txt => { content += `\n[${path}]\n${txt}\n`; }));
                            }
                        });
                        Promise.all(promises).then(() => { rawAttachedFileContent = content; });
                    });
                };
                reader.readAsArrayBuffer(file);
            } else {
                reader.onload = (evt) => { rawAttachedFileContent = evt.target.result; };
                reader.readAsText(file);
            }
        });

        async function enviarMensagemCompleta() {
            const msgInput = document.getElementById("msg-input");
            const texto = msgInput.value.trim();
            if (!texto && !rawAttachedFileContent) return;

            const chat = document.getElementById("chat-window");
            chat.appendChild(renderizarMensagem(texto, "me"));
            
            const promptFinal = texto + "\n" + rawAttachedFileContent;
            msgInput.value = "";
            rawAttachedFileContent = "";
            document.getElementById("file-badge").style.display = "none";

            await chamarGemini(promptFinal);
        }

        async function chamarGemini(prompt) {
            const keys = [localStorage.getItem("k1"), localStorage.getItem("k2"), localStorage.getItem("k3")].filter(k => k);
            if (!keys.length) return alert("Configure as chaves no Painel Admin.");

            try {
                const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${keys[0]}`, {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await resp.json();
                const respostaIA = data.candidates[0].content.parts[0].text;
                document.getElementById("chat-window").appendChild(renderizarMensagem(respostaIA, "ai"));
            } catch (e) {
                alert("Erro ao chamar API.");
            }
        }

        function renderizarMensagem(texto, tipo) {
            const div = document.createElement("div");
            div.className = `bubble-wrapper ${tipo}`;
            div.innerHTML = `<div class="bubble ${tipo}">${texto}</div>`;
            return div;
        }

        // Funções de Interface
        document.getElementById("open-admin-menu").addEventListener("click", () => document.getElementById("admin-drawer").classList.add("active"));
        document.getElementById("close-admin-btn").addEventListener("click", () => document.getElementById("admin-drawer").classList.remove("active"));
        document.getElementById("save-admin-visuals").addEventListener("click", () => {
            localStorage.setItem("k1", document.getElementById("admin-key-1").value);
            localStorage.setItem("k2", document.getElementById("admin-key-2").value);
            localStorage.setItem("k3", document.getElementById("admin-key-3").value);
            alert("Salvo!");
            document.getElementById("api-status-dot").classList.add("online");
        });
        
        document.getElementById("send-btn").addEventListener("click", enviarMensagemCompleta);
        document.getElementById("logout-btn").addEventListener("click", () => location.reload());

        function carregarConfiguracoes() {
            document.getElementById("admin-key-1").value = localStorage.getItem("k1") || "";
            if (localStorage.getItem("k1")) document.getElementById("api-status-dot").classList.add("online");
        }
    </script>
</body>
</html>
