<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DIAMANTE BOT | MASTER SYSTEM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root {
            --wa-bg: #0b141a; 
            --wa-header: #202c33; 
            --wa-green: #00a884;
            --wa-msg-me: #005c4b; 
            --wa-msg-ai: #202c33; 
            --wa-text: #e9edef;
            --wa-input: #2a3942; 
            --wa-accent: #00e676;
            --diamond-glow: #00e5ff;
        }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { background: var(--wa-bg); color: var(--wa-text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* TELA DE LOGIN PREMIUM - TELA CHEIA */
        #auth-screen { position: fixed; inset: 0; background: radial-gradient(circle, #1a1a1a 0%, #050a0d 100%); z-index: 10000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: rgba(34, 46, 53, 0.95); backdrop-filter: blur(15px); padding: 40px 30px; border-radius: 25px; width: 100%; max-width: 420px; text-align: center; border: 1px solid rgba(0, 229, 255, 0.2); box-shadow: 0 20px 50px rgba(0,0,0,0.9); }
        .auth-logo-container { width: 110px; height: 110px; border-radius: 50%; overflow: hidden; margin: 0 auto 20px auto; border: 3px solid var(--diamond-glow); box-shadow: 0 0 20px var(--diamond-glow); }
        .auth-logo-img { width: 100%; height: 100%; object-fit: cover; }
        .auth-input-wrapper { position: relative; width: 100%; margin: 12px 0; }
        .auth-input { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #333; background: var(--wa-input); color: white; outline: none; font-size: 16px; transition: 0.3s; }
        .auth-input:focus { border-color: var(--diamond-glow); }
        .toggle-password { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #8696a0; }
        .btn-diamond { background: linear-gradient(45deg, #008cff, #00e5ff); color: #000; border: none; padding: 15px; border-radius: 30px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 15px; transition: 0.3s; text-transform: uppercase; }
        .btn-diamond:hover { transform: scale(1.02); box-shadow: 0 0 25px var(--diamond-glow); }
        
        /* ESTRUTURA DO APP */
        #app-main { display: none; flex-direction: column; height: 100vh; position: relative; }
        header { background: var(--wa-header); padding: 10px 15px; display: flex; align-items: center; gap: 12px; height: 65px; border-bottom: 1px solid #333; flex-shrink: 0; }
        .avatar-container { width: 45px; height: 45px; border-radius: 50%; overflow: hidden; border: 2px solid var(--diamond-glow); }
        .avatar-img { width: 100%; height: 100%; object-fit: cover; }
        
        .status-info { flex: 1; }
        .status-dot-container { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #8696a0; }
        .status-dot { width: 9px; height: 9px; border-radius: 50%; background: #ff3d00; transition: 0.3s; }
        .status-dot.online { background: #00e676; box-shadow: 0 0 8px #00e676; }
        
        #chat-window { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; background-color: #0b141a; }
        
        /* MENSAGENS */
        .bubble-wrapper { display: flex; width: 100%; gap: 8px; margin-bottom: 5px; }
        .bubble-wrapper.me { justify-content: flex-end; }
        .bubble { max-width: 85%; padding: 12px; border-radius: 15px; font-size: 15px; line-height: 1.4; box-shadow: 0 1px 2px rgba(0,0,0,0.3); position: relative; }
        .bubble.me { background: var(--wa-msg-me); border-top-right-radius: 0; color: white; }
        .bubble.ai { background: var(--wa-msg-ai); border-top-left-radius: 0; color: #e9edef; }
        
        /* FOOTER CORRIGIDO */
        footer { background: var(--wa-header); padding: 10px; display: flex; align-items: center; gap: 8px; flex-shrink: 0; width: 100%; }
        .input-bar { flex: 1; background: var(--wa-input); border-radius: 25px; padding: 5px 15px; display: flex; align-items: center; gap: 10px; min-height: 48px; }
        #msg-input { flex: 1; background: transparent; border: none; color: white; padding: 8px 0; outline: none; font-size: 16px; }
        .action-icon { color: #8696a0; font-size: 22px; cursor: pointer; transition: 0.2s; }
        .btn-send { background: var(--wa-green); border: none; width: 48px; height: 48px; border-radius: 50%; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
        
        .badge-file { background: #004d40; color: #00e676; padding: 4px 12px; border-radius: 10px; font-size: 12px; position: absolute; bottom: 75px; left: 15px; display: none; border: 1px solid #00e676; z-index: 5; }

        /* PAINEL ADMIN */
        .drawer { position: fixed; top: 0; right: -100%; width: 90%; max-width: 400px; height: 100%; background: #111b21; z-index: 20000; transition: 0.4s; padding: 25px; border-left: 2px solid var(--diamond-glow); overflow-y: auto; }
        .drawer.active { right: 0; }
        .section-card { background: #1e2a30; padding: 15px; border-radius: 12px; margin-bottom: 15px; border-left: 4px solid var(--diamond-glow); }
        .download-btn { display: inline-flex; align-items: center; gap: 8px; background: #3b4a54; color: var(--diamond-glow); padding: 8px 12px; border-radius: 8px; text-decoration: none; margin-top: 10px; border: 1px solid var(--diamond-glow); font-size: 13px; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-card">
            <div class="auth-logo-container">
                <img src="https://i.imgur.com/89S9fT3.png" class="auth-logo-img sync-avatar">
            </div>
            <h2 style="color:var(--diamond-glow); margin-bottom: 5px;">DIAMANTE BOT</h2>
            <p style="color: #8696a0; font-size: 12px; margin-bottom: 20px;">SISTEMA INTELIGENTE PREMIUM</p>
            
            <div class="auth-input-wrapper">
                <input type="email" id="auth-email" class="auth-input" placeholder="E-mail">
            </div>
            <div class="auth-input-wrapper">
                <input type="password" id="auth-pass" class="auth-input" placeholder="Senha">
                <i class="fa-solid fa-eye toggle-password" onclick="toggleVisibility()"></i>
            </div>
            
            <button class="btn-diamond" id="login-btn">ENTRAR NO SISTEMA</button>
            
            <div style="margin: 20px 0; color: #8696a0; font-size: 12px; display: flex; align-items: center; justify-content: center; gap: 10px;">
                <hr style="flex:1; border:0; border-top:1px solid #333;"> OU <hr style="flex:1; border:0; border-top:1px solid #333;">
            </div>

            <div id="g_id_onload" data-client_id="296654630911-tvpnofs4m5rkp4n7sj67g8bd12iu3qrg.apps.googleusercontent.com" data-callback="handleGoogleLogin"></div>
            <div class="g_id_signin" data-type="standard" data-shape="rectangular" data-theme="filled_black" data-text="signin_with" data-size="large" data-logo_alignment="left"></div>
        </div>
    </div>

    <div id="app-main">
        <header>
            <div class="avatar-container">
                <img src="https://i.imgur.com/89S9fT3.png" class="avatar-img sync-avatar">
            </div>
            <div class="status-info">
                <h4 style="font-size: 16px; color: #fff;">DIAMANTE BOT</h4>
                <div class="status-dot-container">
                    <div id="api-status-dot" class="status-dot"></div>
                    <span id="api-status-text">Sistema Offline</span>
                </div>
            </div>
            <i class="fa-solid fa-sliders action-icon" id="open-admin-btn" style="display: none;"></i>
            <i class="fa-solid fa-right-from-bracket action-icon" style="margin-left: 10px;" id="logout-btn"></i>
        </header>

        <div id="file-badge" class="badge-file"></div>
        
        <main id="chat-window"></main>

        <footer>
            <div class="input-bar">
                <label for="file-upload" class="action-icon"><i class="fa-solid fa-paperclip"></i></label>
                <input type="file" id="file-upload" style="display: none;" multiple>
                <input type="text" id="msg-input" placeholder="Mensagem">
                <i class="fa-solid fa-microphone action-icon"></i>
            </div>
            <button id="send-btn" class="btn-send">
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </footer>
    </div>

    <div id="admin-drawer" class="drawer">
        <h3 style="color: var(--diamond-glow); margin-bottom: 20px;">PAINEL MASTER ADM</h3>
        
        <div class="section-card">
            <b style="color: #fff;">Identidade Visual</b>
            <input type="text" id="admin-bot-img" class="auth-input" placeholder="Link da Foto do Bot">
            <button class="btn-diamond" onclick="syncGlobalAvatar()" style="padding: 10px;">SINCRONIZAR</button>
        </div>

        <div class="section-card">
            <b style="color: #fff;">Tripla Chave API</b>
            <input type="password" id="admin-key-1" class="auth-input" placeholder="Chave Principal">
            <input type="password" id="admin-key-2" class="auth-input" placeholder="Chave Reserva 1">
            <input type="password" id="admin-key-3" class="auth-input" placeholder="Chave Reserva 2">
            <button class="btn-diamond" id="save-keys-btn" style="padding: 10px;">SALVAR CHAVES</button>
        </div>
        <button class="btn-diamond" style="background: #333; color: #fff;" id="close-drawer">FECHAR</button>
    </div>

    <script>
        const MASTER_EMAIL = "andersoncleyton2022@gmail.com";
        const MASTER_PASS = "339317";
        let rawAttachedContent = "";

        // LOGIN GOOGLE
        function handleGoogleLogin(response) {
            console.log("Logado via Google");
            iniciarApp(false);
        }

        // LOGIN MANUAL
        document.getElementById("login-btn").onclick = () => {
            const email = document.getElementById("auth-email").value.trim().toLowerCase();
            const pass = document.getElementById("auth-pass").value;
            if (email === MASTER_EMAIL && pass === MASTER_PASS) {
                iniciarApp(true);
            } else {
                alert("Acesso Negado.");
            }
        };

        function iniciarApp(isAdmin) {
            document.getElementById("auth-screen").style.display = "none";
            document.getElementById("app-main").style.display = "flex";
            if (isAdmin) document.getElementById("open-admin-btn").style.display = "block";
            carregarConfig();
            checkApiStatus();
        }

        function toggleVisibility() {
            const input = document.getElementById("auth-pass");
            input.type = input.type === "password" ? "text" : "password";
        }

        // SINCRONIA AVATAR
        function syncGlobalAvatar(urlOverride) {
            const url = urlOverride || document.getElementById("admin-bot-img").value;
            if(!url) return;
            document.querySelectorAll(".sync-avatar").forEach(img => img.src = url);
            localStorage.setItem("bot_img", url);
        }

        // ARQUIVOS E ZIP
        document.getElementById("file-upload").onchange = async (e) => {
            const files = e.target.files;
            if (!files.length) return;
            let names = "";
            rawAttachedContent = "--- ARQUIVOS ---\n";
            for (let f of files) {
                names += `📎 ${f.name} `;
                if (f.name.endsWith('.zip')) {
                    const zip = await JSZip.loadAsync(f);
                    for (let path in zip.files) {
                        if (!zip.files[path].dir) {
                            const txt = await zip.files[path].async("text");
                            rawAttachedContent += `\n[${path}]\n${txt}\n`;
                        }
                    }
                } else {
                    const txt = await f.text();
                    rawAttachedContent += `\n[${f.name}]\n${txt}\n`;
                }
            }
            document.getElementById("file-badge").innerText = names;
            document.getElementById("file-badge").style.display = "block";
        };

        // CHAT
        async function enviar() {
            const input = document.getElementById("msg-input");
            const texto = input.value.trim();
            if (!texto && !rawAttachedContent) return;

            renderMsg(texto || "📎 Arquivos enviados", "me");
            const prompt = texto + "\n" + rawAttachedContent;
            
            input.value = "";
            rawAttachedContent = "";
            document.getElementById("file-badge").style.display = "none";
            
            await chamarIA(prompt);
        }

        async function chamarIA(prompt) {
            const keys = [localStorage.getItem("k1"), localStorage.getItem("k2"), localStorage.getItem("k3")].filter(k => k);
            if (!keys.length) return renderMsg("Erro: Sem chaves configuradas.", "ai");

            for (let k of keys) {
                try {
                    const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${k}`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });
                    const data = await resp.json();
                    const resposta = data.candidates[0].content.parts[0].text;
                    renderMsg(resposta, "ai");
                    return;
                } catch (e) { console.error("Chave falhou, tentando próxima..."); }
            }
            renderMsg("Erro crítico: Chaves expiradas.", "ai");
        }

        function renderMsg(texto, tipo) {
            const chat = document.getElementById("chat-window");
            const div = document.createElement("div");
            div.className = `bubble-wrapper ${tipo}`;
            
            let extra = "";
            if(tipo === 'ai' && (texto.includes('```') || texto.length > 500)) {
                extra = `<br><a href="#" class="download-btn" onclick="baixar('${btoa(unescape(encodeURIComponent(texto)))}')"><i class="fa-solid fa-download"></i> Baixar Arquivo</a>`;
            }

            div.innerHTML = `<div class="bubble ${tipo}">${texto.replace(/\n/g, '<br>')}${extra}</div>`;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        function baixar(b64) {
            const txt = decodeURIComponent(escape(atob(b64)));
            const blob = new Blob([txt], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'diamante_bot_file.txt'; a.click();
        }

        // ADMIN
        document.getElementById("open-admin-btn").onclick = () => document.getElementById("admin-drawer").classList.add("active");
        document.getElementById("close-drawer").onclick = () => document.getElementById("admin-drawer").classList.remove("active");
        document.getElementById("save-keys-btn").onclick = () => {
            localStorage.setItem("k1", document.getElementById("admin-key-1").value);
            localStorage.setItem("k2", document.getElementById("admin-key-2").value);
            localStorage.setItem("k3", document.getElementById("admin-key-3").value);
            checkApiStatus();
            alert("Configurações Salvas!");
        };

        function carregarConfig() {
            document.getElementById("admin-key-1").value = localStorage.getItem("k1") || "";
            document.getElementById("admin-key-2").value = localStorage.getItem("k2") || "";
            document.getElementById("admin-key-3").value = localStorage.getItem("k3") || "";
            const savedImg = localStorage.getItem("bot_img");
            if(savedImg) syncGlobalAvatar(savedImg);
        }

        function checkApiStatus() {
            const dot = document.getElementById("api-status-dot");
            const txt = document.getElementById("api-status-text");
            if (localStorage.getItem("k1")) {
                dot.classList.add("online");
                txt.innerText = "Sistema Online";
            }
        }

        document.getElementById("send-btn").onclick = enviar;
        document.getElementById("msg-input").onkeypress = (e) => { if(e.key === 'Enter') enviar(); };
        document.getElementById("logout-btn").onclick = () => location.reload();
    </script>
</body>
</html>
